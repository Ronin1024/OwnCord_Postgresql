name: CI

on:
  push:
    branches:
      - main
      - dev
      - tauri-migration
      - "feature/*"
  pull_request:
    branches:
      - main
      - dev

jobs:
  server-build-test:
    name: Server Build & Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Server/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build server
        run: go build -o chatserver.exe -ldflags "-s -w" .

      - name: Run tests with coverage
        run: go test ./... -cover

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: Server/

  client-build-test:
    name: Client Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build client
        run: dotnet build Client/OwnCord.Client.sln

      - name: Run client tests
        run: dotnet test Client/OwnCord.Client.Tests/

  tauri-client:
    name: Tauri Client Build & Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Client/tauri-client/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/tauri-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Client/tauri-client/src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build Tauri app
        run: npm run tauri build
